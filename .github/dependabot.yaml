# .github/dependabot.yml

version: 2
updates:
  - package-ecosystem: "pip" # Use "pip" for pyproject.toml
    directory: "/" # Location of pyproject.toml
    schedule:
      interval: "weekly" # How often to check for updates
    
    # Target specific packages for updates
    allow:
      - dependency-name: "transformers"
      - dependency-name: "diffusers"

    target-branch: "dependabot" # Target branch for PRs